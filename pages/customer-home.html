<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">My Account</a></li>
                <li>
                    <label for="account-switcher">Switch Account:</label>
                    <select id="account-switcher">
                        <option value="account1">Account 1</option>
                        <option value="account2">Account 2</option>
                        <option value="account3">Account 3</option>
                    </select>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome to Your Customer Home Page</h1>
        <p>Your account details will be displayed here.</p>
        <section id="account-details">
            <h2>Account Details</h2>
            <p>Details about your account will go here.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Company Name. All rights reserved.</p>
    </footer>
</body>
</html>
